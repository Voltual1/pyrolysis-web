name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 在最开始腾出空间（可选：如果项目真的非常庞大，解除下面这三行的注释）
      # - name: Maximize build space
      #   uses: easimon/maximize-build-space@master
      #   with:
      #     remove-dotnet: 'true'
      #     remove-android: 'false' # 编译Android别删这个
      #     remove-haskell: 'true'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          
      - name: Set up Node.js (For KMP)
        uses: actions/setup-node@v4
        with:
          node-version: '24.10.0'          

      # 2. 核心优化：只用 setup-gradle，利用其自带的缓存和自动清理功能
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # 自动清理无用缓存，防止磁盘爆掉
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }} # 可选
          
      # 🛑 【删除了原有的 actions/cache@v3 步骤，交由上面的 setup-gradle 托管】
          
      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
        run: |
          echo $ENCODED_STRING | base64 -d > android/tag_keystore.p12

      # 3. 构建时增加守护进程关闭，减少内存/空间占用
      - name: Build with Gradle
        run: ./gradlew :arsc:jvmTest --info --no-daemon
        env:
          KEYSTORE_PATH: tag_keystore.p12  
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}          

      - name: Get version info
        id: version
        shell: bash
        run: |
          echo "BUILD_VERSION=auto-build-$(date +%Y%m%d_%H%M%S)-${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_OUTPUT

#      - name: Create Draft Release
#        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
